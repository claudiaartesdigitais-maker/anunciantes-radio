<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel de Destaque - Rádio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }
        
        header { text-align: center; padding: 25px 10px; width: 100%; border-bottom: 1px solid #f0f0f0; margin-bottom: 20px; }
        header h1 { color: #001a33; font-size: 20px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        /* FEED VERTICAL (UM EMBAIXO DO OUTRO) */
        .feed-vertical { 
            display: flex;
            flex-direction: column; /* Força a descida vertical */
            width: 100%; 
            max-width: 500px; /* Limite para não esticar demais em tablets */
            gap: 35px; /* Espaço elegante entre os anúncios */
            padding: 0 15px;
        }

        .feed-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            transition: transform 0.2s;
        }

        /* Efeito de Clique */
        .feed-item:active { transform: scale(0.98); }

        .feed-item img { 
            width: 100%; 
            height: auto;
            display: block;
            pointer-events: none; 
            -webkit-user-drag: none;
            user-select: none;
        }

        .btn-contato {
            width: 100%;
            background: #25d366; 
            color: white;
            padding: 16px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            text-decoration: none;
            text-transform: uppercase;
        }

        .btn-contato i { margin-left: 10px; font-size: 20px; }

        #loading { color: #999; margin-top: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <header><h1>Painel de Anunciantes</h1></header>

    <div id="loading">Carregando oportunidades...</div>
    
    <div id="feed-lista" class="feed-vertical"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5xrZQpn4MWW9uISAqSbSa-QNPtIrYO271FrpWZAJAtm10OYyHqoaFYZQz-zcbi-FNfg/exec";

        async function carregar() {
            try {
                const response = await fetch(`${SCRIPT_URL}?aba=Anunciantes&t=${Date.now()}`);
                const dados = await response.json();
                
                const lista = document.getElementById('feed-lista');
                document.getElementById('loading').style.display = 'none';
                lista.innerHTML = "";

                dados.forEach(item => {
                    if (item.arte && item.arte.trim() !== "") {
                        // Se o link for WhatsApp, usamos o ícone do Whats, se não, um ícone de link
                        const linkWhatsapp = (item.link && item.link.includes('http')) ? item.link : "#";
                        const iconClass = linkWhatsapp.includes('wa.me') || linkWhatsapp.includes('api.whatsapp') ? 'fab fa-whatsapp' : 'fas fa-external-link-alt';
                        
                        lista.innerHTML += `
                            <div class="feed-item">
                                <img src="${item.arte}" alt="Anúncio">
                                <a href="${linkWhatsapp}" class="btn-contato" target="_blank">
                                    Falar com o Anunciante <i class="${iconClass}"></i>
                                </a>
                            </div>`;
                    }
                });
            } catch (err) {
                document.getElementById('loading').innerText = "Erro ao carregar os anúncios.";
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
