<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anunciantes - Rádio TV Nova Cotia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Reset total para evitar travamentos de scroll */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            width: 100%;
            height: auto;
            min-height: 100%;
            background: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            /* Força o scroll natural do sistema */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        header { 
            text-align: center; 
            padding: 20px 10px; 
            width: 100%; 
            background: #001a33;
            margin-bottom: 25px;
        }
        header h1 { 
            color: #ffffff; 
            font-size: 22px; 
            text-transform: uppercase; 
            font-weight: 800; 
            letter-spacing: 2px; 
        }

        /* Container do Feed - Sem travas de altura */
        .feed-vertical { 
            display: block; /* Mudado para block para garantir fluxo vertical simples */
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto;
            padding: 0 15px 60px 15px; /* Espaço extra no final para não cortar o último */
        }

        .feed-item {
            width: 100%;
            margin-bottom: 35px; /* Espaçamento entre os blocos */
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
            background: #fff;
        }

        /* Imagem liberada para toque e arraste */
        .feed-item img { 
            width: 100%; 
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        .btn-contato {
            width: 100%;
            background: #25d366; 
            color: white;
            padding: 18px;
            font-weight: bold;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            text-transform: uppercase;
            border: none;
        }

        .btn-contato i { margin-left: 10px; font-size: 20px; }

        #loading { text-align: center; color: #999; padding: 40px; font-weight: bold; }
    </style>
</head>
<body>

    <header><h1>Anunciantes</h1></header>

    <div id="loading">Carregando anúncios...</div>
    
    <div id="feed-lista" class="feed-vertical"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5xrZQpn4MWW9uISAqSbSa-QNPtIrYO271FrpWZAJAtm10OYyHqoaFYZQz-zcbi-FNfg/exec";

        async function carregar() {
            try {
                // Adicionado cache-busting para sempre vir a última versão da planilha
                const response = await fetch(`${SCRIPT_URL}?aba=Anunciantes&t=${new Date().getTime()}`);
                const dados = await response.json();
                
                const lista = document.getElementById('feed-lista');
                const loading = document.getElementById('loading');
                if(loading) loading.style.display = 'none';
                
                lista.innerHTML = "";

                dados.forEach(item => {
                    if (item.arte && item.arte.trim() !== "") {
                        const linkDestino = (item.link && item.link.includes('http')) ? item.link : "#";
                        const iconClass = linkDestino.includes('wa.me') || linkDestino.includes('api.whatsapp') ? 'fab fa-whatsapp' : 'fas fa-external-link-alt';
                        
                        // Estrutura simplificada para evitar "engasgos" no mobile
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'feed-item';
                        itemDiv.innerHTML = `
                            <img src="${item.arte}" alt="Anúncio">
                            <a href="${linkDestino}" class="btn-contato" target="_blank">
                                Falar com o Anunciante <i class="${iconClass}"></i>
                            </a>
                        `;
                        lista.appendChild(itemDiv);
                    }
                });
            } catch (err) {
                document.getElementById('loading').innerText = "Erro ao carregar os anunciantes.";
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
