<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anunciantes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            /* Travamos o corpo para ele não rolar */
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header { 
            flex-shrink: 0; /* O cabeçalho nunca encolhe */
            text-align: center; 
            padding: 20px 10px; 
            background: #001a33; 
            z-index: 10;
        }
        header h1 { color: #ffffff; font-size: 20px; text-transform: uppercase; }

        /* A área do feed agora tem scroll próprio e fixo */
        .feed-vertical { 
            flex-grow: 1; /* Ocupa todo o espaço restante */
            overflow-y: auto; /* O scroll acontece APENAS aqui dentro */
            -webkit-overflow-scrolling: touch;
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto; 
            padding: 20px 15px;
        }

        .feed-item {
            width: 100%;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: #fff;
        }

        .feed-item img { 
            width: 100%; 
            display: block;
            pointer-events: none; /* Imagem travada */
            -webkit-user-drag: none;
        }

        .btn-contato {
            width: 100%;
            background: #25d366; 
            color: white;
            padding: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header><h1>Anunciantes</h1></header>

    <div id="feed-lista" class="feed-vertical"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5xrZQpn4MWW9uISAqSbSa-QNPtIrYO271FrpWZAJAtm10OYyHqoaFYZQz-zcbi-FNfg/exec";

        async function carregar() {
            const res = await fetch(`${SCRIPT_URL}?aba=Anunciantes&t=${Date.now()}`);
            const dados = await res.json();
            const lista = document.getElementById('feed-lista');
            
            lista.innerHTML = dados.map(item => {
                if (!item.arte) return '';
                return `
                    <div class="feed-item">
                        <img src="${item.arte}" alt="Anúncio">
                        <a href="${item.link}" class="btn-contato" target="_blank">
                            Falar com o Anunciante <i class="fab fa-whatsapp" style="margin-left:10px"></i>
                        </a>
                    </div>`;
            }).join('');
        }
        carregar();
    </script>
</body>
</html>
